<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Successful | Padel Badeli 7yeti</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .success-card {
            background: white;
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .check-icon {
            background: #2ecc71;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .check-icon svg {
            width: 48px;
            height: 48px;
            stroke: white;
            stroke-width: 2;
        }
        h1 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #555;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .logout-btn {
            display: inline-block;
            background: linear-gradient(to right, #e74c3c, #c0392b);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(231,76,60,0.3);
        }
        .logout-btn:active {
            transform: translateY(0);
        }
        .footer-note {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #777;
        }
        .footer-note a {
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="check-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Signed up successfully! ✅</h1>

        <div class="footer-note">
            <a href="../html/acceuil.html">← Back to lobby</a>
        </div>
    </div>
</body>
</html>
